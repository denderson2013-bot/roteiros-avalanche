<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0b0f">
<title>Roteiros Avalanche</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0b0f;
  --bg-card: #12141c;
  --bg-card-hover: #181b26;
  --border: rgba(255,255,255,0.06);
  --border-strong: rgba(255,255,255,0.12);
  --text-hi: #f1f3f7;
  --text-mid: #9ca3b4;
  --text-dim: #5a6178;
  --accent: #3b82f6;
  --accent-glow: rgba(59,130,246,0.15);
  --cyan: #06b6d4;
  --green: #10b981;
  --orange: #f59e0b;
  --radius: 12px;
  --font: 'Plus Jakarta Sans', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { -webkit-text-size-adjust:100%; }
body { font-family:var(--font); background:var(--bg); color:var(--text-hi); min-height:100vh; min-height:100dvh; -webkit-font-smoothing:antialiased; }

/* ===== HEADER ===== */
.header {
  padding:20px 16px 16px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg, rgba(59,130,246,0.05) 0%, transparent 100%);
  position:sticky; top:0; z-index:50;
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
}
.header-top { display:flex; align-items:center; justify-content:space-between; gap:12px; }
.logo { display:flex; align-items:center; gap:10px; min-width:0; }
.logo-icon { width:36px; height:36px; border-radius:9px; background:linear-gradient(135deg, var(--accent), var(--cyan)); display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
.logo-text { font-size:17px; font-weight:700; letter-spacing:-0.3px; white-space:nowrap; }
.logo-sub { font-size:11px; color:var(--text-dim); font-weight:400; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.header-stats { display:flex; gap:16px; flex-shrink:0; }
.stat { text-align:center; }
.stat-num { font-size:22px; font-weight:800; line-height:1; }
.stat-label { font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.8px; margin-top:3px; }

/* ===== FILTERS ===== */
.filters {
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  background:rgba(18,20,28,0.95);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  position:sticky; top:73px; z-index:40;
  display:flex; flex-direction:column; gap:10px;
}
.filter-row { display:flex; gap:8px; align-items:center; }
.filter-scroll {
  display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch;
  scrollbar-width:none; flex:1; padding-bottom:2px;
}
.filter-scroll::-webkit-scrollbar { display:none; }
.filter-btn {
  padding:6px 12px; border-radius:8px; border:1px solid var(--border);
  background:transparent; color:var(--text-mid); font-size:12px; font-weight:500;
  cursor:pointer; transition:all 0.15s; font-family:var(--font);
  white-space:nowrap; flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.filter-btn:active { transform:scale(0.96); }
.filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.search-box {
  width:100%; padding:10px 14px; border-radius:10px; border:1px solid var(--border);
  background:var(--bg); color:var(--text-hi); font-size:15px; outline:none;
  font-family:var(--font); -webkit-appearance:none;
}
.search-box:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
.search-box::placeholder { color:var(--text-dim); }

/* ===== MAIN ===== */
.main { padding:12px 12px calc(12px + var(--safe-bottom)); max-width:900px; margin:0 auto; }

/* ===== ROTEIRO CARD ===== */
.roteiro-card {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius); margin-bottom:10px;
  overflow:hidden; transition:border-color 0.2s;
}
.roteiro-card:active { border-color:var(--border-strong); }

.roteiro-header {
  display:flex; flex-direction:column; padding:14px 16px;
  cursor:pointer; gap:8px; -webkit-tap-highlight-color:transparent;
}
.roteiro-header-top { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.roteiro-date {
  font-family:var(--mono); font-size:12px; color:var(--cyan); font-weight:500;
  display:flex; align-items:center; gap:6px;
}
.roteiro-weekday { color:var(--text-dim); font-size:11px; }
.roteiro-badge { padding:3px 8px; border-radius:6px; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.4px; }
.badge-pendente { background:rgba(245,158,11,0.12); color:var(--orange); border:1px solid rgba(245,158,11,0.2); }
.badge-gravado { background:rgba(16,185,129,0.12); color:var(--green); border:1px solid rgba(16,185,129,0.2); }
.badge-agent { padding:3px 8px; border-radius:6px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; background:rgba(139,92,246,0.12); color:#a78bfa; border:1px solid rgba(139,92,246,0.25); font-family:var(--mono); }
.roteiro-title { font-size:14px; font-weight:600; color:var(--text-hi); line-height:1.45; }
.roteiro-footer { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.roteiro-meta-row { display:flex; gap:12px; font-size:11px; color:var(--text-dim); }
.roteiro-meta-row span { display:flex; align-items:center; gap:3px; }
.roteiro-chevron { color:var(--text-dim); transition:transform 0.2s; font-size:14px; flex-shrink:0; }
.roteiro-card.open .roteiro-chevron { transform:rotate(180deg); }

/* ===== ROTEIRO BODY ===== */
.roteiro-body { display:none; border-top:1px solid var(--border); }
.roteiro-card.open .roteiro-body { display:block; }

.roteiro-tabs {
  display:flex; border-bottom:1px solid var(--border);
  padding:0 16px; gap:0;
}
.roteiro-tab {
  padding:10px 14px; font-size:13px; font-weight:500;
  color:var(--text-dim); cursor:pointer;
  border-bottom:2px solid transparent; transition:all 0.15s;
  -webkit-tap-highlight-color:transparent;
  flex:1; text-align:center;
}
.roteiro-tab:active { opacity:0.7; }
.roteiro-tab.active { color:var(--accent); border-bottom-color:var(--accent); }

.roteiro-content { padding:16px; }

/* Atos */
.ato { margin-bottom:18px; }
.ato:last-child { margin-bottom:0; }
.ato-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; flex-wrap:wrap; }
.ato-num {
  width:26px; height:26px; border-radius:50%;
  background:linear-gradient(135deg, var(--accent), var(--cyan));
  color:#fff; font-size:11px; font-weight:700;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.ato-title { font-size:12px; font-weight:600; color:var(--cyan); text-transform:uppercase; letter-spacing:0.4px; }
.ato-dir { font-size:11px; color:var(--text-dim); font-style:italic; }
.ato-text { font-size:14px; line-height:1.75; color:var(--text-mid); padding-left:34px; }

/* Teleprompter */
.teleprompter-text {
  font-size:17px; line-height:2; color:var(--text-hi);
  white-space:pre-wrap; font-weight:400;
  padding:4px 0;
}

/* Actions */
.roteiro-actions {
  display:flex; gap:6px; padding:12px 16px;
  border-top:1px solid var(--border);
  flex-wrap:wrap;
}
.action-btn {
  padding:10px 14px; border-radius:10px; border:1px solid var(--border);
  background:transparent; color:var(--text-mid); font-size:13px; font-weight:500;
  cursor:pointer; display:flex; align-items:center; gap:5px;
  transition:all 0.15s; font-family:var(--font);
  -webkit-tap-highlight-color:transparent;
  flex:1; justify-content:center; min-width:0; white-space:nowrap;
}
.action-btn:active { transform:scale(0.97); }
.action-btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }

/* Empty */
.empty { text-align:center; padding:60px 20px; color:var(--text-dim); }
.empty-icon { font-size:40px; margin-bottom:12px; }
.empty-text { font-size:15px; }

/* Toast */
.toast {
  position:fixed; bottom:calc(20px + var(--safe-bottom)); left:16px; right:16px;
  background:var(--green); color:#fff; padding:14px 20px;
  border-radius:12px; font-size:14px; font-weight:600;
  opacity:0; transform:translateY(10px); transition:all 0.3s;
  z-index:999; pointer-events:none; text-align:center;
}
.toast.show { opacity:1; transform:translateY(0); }

/* ===== DESKTOP ===== */
@media(min-width:640px) {
  .header { padding:24px 32px 20px; }
  .filters { padding:14px 32px; flex-direction:row; align-items:center; position:sticky; top:81px; }
  .filter-row { flex:1; }
  .search-box { width:240px; font-size:13px; padding:8px 14px; }
  .main { padding:20px 32px; }
  .roteiro-header { flex-direction:row; align-items:center; padding:18px 20px; gap:14px; }
  .roteiro-header-top { flex:0 0 auto; }
  .roteiro-title { flex:1; }
  .roteiro-footer { flex:0 0 auto; }
  .roteiro-content { padding:20px 24px; }
  .ato-text { font-size:14px; padding-left:38px; }
  .roteiro-actions { flex-wrap:nowrap; padding:14px 20px; }
  .action-btn { flex:0 1 auto; }
  .logo-text { font-size:20px; }
  .stat-num { font-size:26px; }
  .toast { left:auto; right:24px; width:auto; max-width:360px; }
}

@media(min-width:1024px) {
  .header { padding:28px 40px 24px; }
  .filters { padding:16px 40px; top:89px; }
  .main { padding:24px 40px; }
  .teleprompter-text { font-size:20px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🎬</div>
      <div>
        <div class="logo-text">Roteiros Avalanche</div>
        <div class="logo-sub">Histórico de Reels • IA diariamente</div>
      </div>
    </div>
    <div class="header-stats">
      <div class="stat">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-gravados" style="color:var(--green)">0</div>
        <div class="stat-label">Gravados</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-pendentes" style="color:var(--orange)">0</div>
        <div class="stat-label">Pendentes</div>
      </div>
    </div>
  </div>
</div>

<div class="filters">
  <div class="filter-row">
    <div class="filter-scroll" id="month-filters"></div>
    <div class="filter-scroll">
      <button class="filter-btn active" onclick="filterStatus('all',this)">Todos</button>
      <button class="filter-btn" onclick="filterStatus('pendente',this)">⏳ Pendentes</button>
      <button class="filter-btn" onclick="filterStatus('gravado',this)">✅ Gravados</button>
    </div>
  </div>
  <input type="text" class="search-box" id="search" placeholder="🔍 Buscar roteiros..." autocomplete="off">
</div>

<div class="main" id="roteiros-list"></div>
<div class="toast" id="toast"></div>

<script>
let roteiros=[], currentFilter='all', currentMonth='all', searchQuery='';

async function loadRoteiros(){
  try{
    const r=await fetch('roteiros.json?t='+Date.now());
    roteiros=await r.json();
    roteiros.sort((a,b)=>b.date.localeCompare(a.date));
    renderStats(); renderMonthFilters(); renderList();
  }catch(e){
    document.getElementById('roteiros-list').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Erro ao carregar roteiros</div></div>';
  }
}

function renderStats(){
  document.getElementById('stat-total').textContent=roteiros.length;
  document.getElementById('stat-gravados').textContent=roteiros.filter(r=>r.status==='gravado').length;
  document.getElementById('stat-pendentes').textContent=roteiros.filter(r=>r.status!=='gravado').length;
}

function renderMonthFilters(){
  const months=new Set();
  roteiros.forEach(r=>{const d=new Date(r.date+'T12:00:00');months.add(d.toLocaleDateString('pt-BR',{month:'short',year:'numeric'}));});
  let h='<button class="filter-btn active" onclick="filterMonth(\'all\',this)">Todos</button>';
  months.forEach(m=>{h+='<button class="filter-btn" onclick="filterMonth(\''+m+'\',this)">'+m.charAt(0).toUpperCase()+m.slice(1)+'</button>';});
  document.getElementById('month-filters').innerHTML=h;
}

function filterStatus(s,btn){
  currentFilter=s;
  btn.parentElement.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); renderList();
}

function filterMonth(m,btn){
  currentMonth=m;
  document.querySelectorAll('#month-filters .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); renderList();
}

document.getElementById('search').addEventListener('input',function(e){searchQuery=e.target.value.toLowerCase();renderList();});

function getFiltered(){
  return roteiros.filter(r=>{
    if(currentFilter!=='all'&&r.status!==currentFilter)return false;
    if(currentMonth!=='all'){const d=new Date(r.date+'T12:00:00');if(d.toLocaleDateString('pt-BR',{month:'short',year:'numeric'})!==currentMonth)return false;}
    if(searchQuery&&!(r.historia+' '+r.roteiro+' '+r.fonte).toLowerCase().includes(searchQuery))return false;
    return true;
  });
}

function fmtDate(s){const d=new Date(s+'T12:00:00');const ms=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];return d.getDate().toString().padStart(2,'0')+' '+ms[d.getMonth()];}
function fmtWeek(s){return new Date(s+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'short'}).replace('.','');}

function parseAtos(rot){
  const atos=[];
  // Try bracket format first: [ATO 1 — TITLE | dir]
  let parts=rot.split(/\[ATO\s*(\d+)/i);
  if(parts.length>1){
    for(let i=1;i<parts.length;i+=2){
      const num=parts[i]; let c=parts[i+1]||'';
      const tm=c.match(/^[^]*?—\s*([^|[\]]+)/), dm=c.match(/\|\s*([^\]]+)\]/);
      atos.push({num,title:tm?tm[1].trim():'ATO '+num,dir:dm?dm[1].trim():'',text:c.replace(/^[^\]]*\]\s*/,'').trim()});
    }
    return atos;
  }
  // Fallback: ATO 1 — TITLE (no brackets)
  parts=rot.split(/^ATO\s+(\d+)\s*[—\-]\s*/im);
  for(let i=1;i<parts.length;i+=2){
    const num=parts[i]; let c=parts[i+1]||'';
    const lines=c.split('\n');
    const title=lines[0]?lines[0].trim():'ATO '+num;
    let dir='', textStart=1;
    if(lines[1]&&lines[1].trim().startsWith('[')){
      dir=lines[1].trim().replace(/^\[|\]$/g,'');
      textStart=2;
    }
    const text=lines.slice(textStart).join('\n').trim();
    atos.push({num,title,dir,text});
  }
  return atos;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderList(){
  const f=getFiltered(), list=document.getElementById('roteiros-list');
  if(!f.length){list.innerHTML='<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">Nenhum roteiro encontrado</div></div>';return;}
  let h='';
  f.forEach((r,i)=>{
    const atos=parseAtos(r.roteiro);
    const badge=r.status==='gravado'?'<span class="roteiro-badge badge-gravado">✓ Gravado</span>':'<span class="roteiro-badge badge-pendente">Pendente</span>';
    const agentBadge=r.agent?'<span class="roteiro-badge badge-agent">'+esc(r.agent)+'</span>':'';
    const m=r.metricas||{};
    let ah='';
    atos.forEach(a=>{ah+='<div class="ato"><div class="ato-header"><div class="ato-num">'+a.num+'</div><div class="ato-title">'+esc(a.title)+'</div>'+(a.dir?'<div class="ato-dir">'+esc(a.dir)+'</div>':'')+'</div><div class="ato-text">'+esc(a.text)+'</div></div>';});
    h+='<div class="roteiro-card" id="card-'+i+'">'
      +'<div class="roteiro-header" onclick="toggleCard('+i+')">'
      +'<div class="roteiro-header-top">'
      +'<div class="roteiro-date"><span class="roteiro-weekday">'+fmtWeek(r.date)+'</span> '+fmtDate(r.date)+'</div>'
      +agentBadge+badge
      +'</div>'
      +'<div class="roteiro-title">'+esc(r.historia)+'</div>'
      +'<div class="roteiro-footer">'
      +'<div class="roteiro-meta-row">'
      +(m.totalPalavras?'<span>📝 '+m.totalPalavras+'</span>':'')
      +(m.duracaoFinal?'<span>⏱ '+m.duracaoFinal+'</span>':'')
      +'<span>📰 '+esc(r.fonte)+'</span>'
      +'</div>'
      +'<span class="roteiro-chevron">▾</span>'
      +'</div></div>'
      +'<div class="roteiro-body">'
      +'<div class="roteiro-tabs">'
      +'<div class="roteiro-tab active" onclick="switchTab(this,'+i+',\'atos\')">7 Atos</div>'
      +'<div class="roteiro-tab" onclick="switchTab(this,'+i+',\'teleprompter\')">Teleprompter</div>'
      +'</div>'
      +'<div class="roteiro-content" id="content-'+i+'">'+ah+'</div>'
      +'<div class="roteiro-actions">'
      +'<button class="action-btn primary" onclick="event.stopPropagation();copyTP('+i+')">📋 Copiar</button>'
      +'<button class="action-btn" onclick="event.stopPropagation();toggleSt('+i+')">'+(r.status==='gravado'?'↩ Pendente':'✓ Gravado')+'</button>'
      +'<button class="action-btn" onclick="event.stopPropagation();dlTxt('+i+')">💾 TXT</button>'
      +'</div></div></div>';
  });
  list.innerHTML=h;
}

function toggleCard(i){document.getElementById('card-'+i).classList.toggle('open');}

function switchTab(tab,i,type){
  tab.parentElement.querySelectorAll('.roteiro-tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  const r=getFiltered()[i], el=document.getElementById('content-'+i);
  if(type==='teleprompter'){el.innerHTML='<div class="teleprompter-text">'+esc(r.teleprompter)+'</div>';}
  else{const atos=parseAtos(r.roteiro);let h='';atos.forEach(a=>{h+='<div class="ato"><div class="ato-header"><div class="ato-num">'+a.num+'</div><div class="ato-title">'+esc(a.title)+'</div>'+(a.dir?'<div class="ato-dir">'+esc(a.dir)+'</div>':'')+'</div><div class="ato-text">'+esc(a.text)+'</div></div>';});el.innerHTML=h;}
}

function copyTP(i){const r=getFiltered()[i];navigator.clipboard.writeText(r.teleprompter).then(()=>showToast('📋 Teleprompter copiado!')).catch(()=>{const ta=document.createElement('textarea');ta.value=r.teleprompter;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('📋 Teleprompter copiado!');});}

function toggleSt(i){const r=getFiltered()[i];const idx=roteiros.findIndex(x=>x.date===r.date);if(idx>=0){roteiros[idx].status=roteiros[idx].status==='gravado'?'pendente':'gravado';renderStats();renderList();showToast(roteiros[idx].status==='gravado'?'✅ Marcado como gravado':'⏳ Marcado como pendente');}}

function dlTxt(i){const r=getFiltered()[i];const t='ROTEIRO — '+r.date+'\n'+r.historia+'\nFonte: '+r.fonte+'\n\n'+r.roteiro;const b=new Blob([t],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='roteiro-'+r.date+'.txt';a.click();}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

loadRoteiros();
</script>
</body>
</html>
